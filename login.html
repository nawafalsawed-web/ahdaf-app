<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#130626">
<title>دخول · أهداف</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:"Saudi Serif";src:url("assets/fonts/SaudiSerif-Regular.ttf") format("truetype");font-weight:400;font-display:swap}
  @font-face{font-family:"Saudi Serif";src:url("assets/fonts/SaudiSerif-Medium.ttf") format("truetype");font-weight:500;font-display:swap}
  @font-face{font-family:"Saudi Serif";src:url("assets/fonts/SaudiSerif-Bold.ttf") format("truetype");font-weight:700;font-display:swap}
  :root{--purple:#4C0192;--night:#1C0A36;--night2:#130626;--gold:#C9A227;--gold-bright:#E7D9A8;
    --ink:#211833;--muted:#8b8496;--line:#e3e0e9}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans Arabic","Saudi Serif",-apple-system,"SF Arabic","Segoe UI",Tahoma,sans-serif;
    background:radial-gradient(130% 160% at 85% -20%,#3A1566 0%,#1C0A36 52%,#130626 100%);
    color:var(--ink);min-height:100vh;min-height:100dvh;
    display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
  /* دوائر الهدف الذهبية — توقيع الهوية */
  .rings{position:fixed;inset-inline-end:-140px;top:-120px;width:520px;height:520px;pointer-events:none;
    animation:turn 140s linear infinite}
  .rings2{inset-inline-end:auto;inset-inline-start:-200px;top:auto;bottom:-260px;width:560px;height:560px;opacity:.55}
  @keyframes turn{to{transform:rotate(360deg)}}
  .wrap{position:relative;z-index:1;width:100%;max-width:400px;animation:rise .6s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .brand-head{text-align:center;margin-bottom:26px}
  .brand-mark{width:52px;height:52px;margin:0 auto 14px;border-radius:50%;border:1.6px solid var(--gold);
    display:grid;place-items:center;position:relative}
  .brand-mark::after{content:"";position:absolute;inset:-9px;border-radius:50%;border:1px dashed rgba(201,162,39,.4)}
  .brand-mark span{width:14px;height:14px;border-radius:50%;background:var(--gold)}
  .brand{font-family:"Saudi Serif",serif;font-size:34px;font-weight:700;color:#fff;letter-spacing:.3px}
  .tag{color:rgba(231,217,168,.85);font-size:13px;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:10px}
  .tag::before,.tag::after{content:"";width:26px;height:1px;background:rgba(201,162,39,.5)}
  .card{background:#fff;border-radius:26px;width:100%;padding:32px 28px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.55),0 0 0 1px rgba(231,217,168,.14)}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin-bottom:7px}
  input{width:100%;border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;font-size:16px;
    font-family:inherit;background:#fafafb;color:var(--ink);margin-bottom:16px;transition:border-color .15s}
  input:focus{outline:none;border-color:var(--purple);background:#fff;box-shadow:0 0 0 3px #f1ebfa}
  .phone-row{display:flex;gap:8px;direction:ltr}
  .phone-row select{flex:none;width:96px;border:1.5px solid var(--line);border-radius:13px;background:#fafafb;font-family:inherit;font-size:15px;padding:0 8px}
  .phone-row input{flex:1;text-align:left;margin-bottom:0}
  .phone-wrap{margin-bottom:18px}
  button{width:100%;background:var(--night);color:var(--gold-bright);border:none;border-radius:15px;padding:15px;
    font-size:15.5px;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .1s;
    box-shadow:0 12px 26px -8px rgba(19,6,38,.5)}
  button:active{opacity:.85;transform:scale(.99)}button:disabled{opacity:.5}
  .err{background:#fdecea;color:#c0392b;font-size:13.5px;padding:10px 14px;border-radius:10px;margin-bottom:16px;text-align:center;display:none}
  .note{text-align:center;color:rgba(255,255,255,.55);font-size:12px;margin-top:20px;line-height:1.8}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;animation-delay:0s!important;animation-iteration-count:1!important}}
</style>
</head>
<body>
  <svg class="rings" viewBox="0 0 320 320" fill="none" aria-hidden="true">
    <circle cx="160" cy="160" r="152" stroke="#C9A227" stroke-opacity=".2"/>
    <circle cx="160" cy="160" r="114" stroke="#C9A227" stroke-opacity=".28" stroke-dasharray="3 8"/>
    <circle cx="160" cy="160" r="76" stroke="#C9A227" stroke-opacity=".36"/>
    <circle cx="160" cy="160" r="40" stroke="#C9A227" stroke-opacity=".45"/>
    <circle cx="160" cy="160" r="7" fill="#C9A227" fill-opacity=".7"/>
  </svg>
  <svg class="rings rings2" viewBox="0 0 320 320" fill="none" aria-hidden="true">
    <circle cx="160" cy="160" r="152" stroke="#C9A227" stroke-opacity=".16"/>
    <circle cx="160" cy="160" r="100" stroke="#C9A227" stroke-opacity=".22" stroke-dasharray="3 9"/>
    <circle cx="160" cy="160" r="52" stroke="#C9A227" stroke-opacity=".28"/>
  </svg>
  <div class="wrap">
  <div class="brand-head">
    <div class="brand-mark"><span></span></div>
    <div class="brand">أهداف</div>
    <div class="tag">صالة عمل الفريق</div>
  </div>
  <div class="card">
    <div class="err" id="err"></div>
    <label>البريد الإلكتروني</label>
    <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@ahdaf.co" dir="ltr" style="text-align:left">
    <label>رقم الجوال</label>
    <div class="phone-wrap"><div class="phone-row">
      <select id="dial"><option>+966</option><option>+971</option><option>+973</option><option>+974</option><option>+965</option><option>+968</option><option>+20</option></select>
      <input id="phone" type="tel" inputmode="numeric" placeholder="5XXXXXXXX">
    </div></div>
    <button id="btn">دخول</button>
  </div>
  <p class="note">الدخول مخصّص لفريق أهداف فقط.<br>لو ما عندك حساب، كلّم المشرف.</p>
  </div>
  <script>
    const BOT = /^(localhost|127\.|192\.168\.|10\.)/.test(location.hostname)
      ? 'http://localhost:3000' : location.origin + '/bot';
    const $ = id => document.getElementById(id);
    const showErr = m => { const e=$('err'); e.textContent=m; e.style.display='block'; };

    // لو مسجّل دخول أصلاً → التطبيق
    (async()=>{ try{ const r=await fetch(BOT+'/auth/me',{credentials:'same-origin'}); if(r.ok) location.replace('index.html'); }catch{} })();

    async function login(){
      const email=$('email').value.trim();
      const phone=$('dial').value.replace(/\D/g,'') + $('phone').value.replace(/\D/g,'').replace(/^0+/,'');
      if(!email || !$('phone').value.trim()){ showErr('عبّي البريد ورقم الجوال'); return; }
      $('btn').disabled=true; $('btn').textContent='جاري الدخول…';
      try{
        const r=await fetch(BOT+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({email,phone})});
        const d=await r.json();
        if(r.ok && d.ok){ location.replace('index.html'); }
        else{ showErr(d.error||'تعذّر الدخول'); $('btn').disabled=false; $('btn').textContent='دخول'; }
      }catch(e){ showErr('ما قدرت أوصل للسيرفر'); $('btn').disabled=false; $('btn').textContent='دخول'; }
    }
    $('btn').addEventListener('click', login);
    $('phone').addEventListener('keydown', e=>{ if(e.key==='Enter') login(); });
  </script>
</body>
</html>
